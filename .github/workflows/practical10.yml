name: Complete CI/CD Pipeline

on:
  push:
    paths:
      - 'Prac10/**'
      - '.github/workflows/practical10.yml'

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r Prac10/requirements.txt

      - name: Run Tests
        run: |
          cd Prac10
          pytest

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest ./Prac10

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

  kubernetes:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Kubernetes Stage
        run: echo "Deployment manifest prepared successfully"