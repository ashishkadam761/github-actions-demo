name: Practical 7 - Matrix Build

on:
  push:
    paths:
      - 'Prac7/**'
      - '.github/workflows/practical7.yml'

jobs:
  matrix-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python Version
        run: python Prac7/app.py